name: Update Market Signals

on:
  schedule:
    # Run every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC
    - cron: "0 */6 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market signal generation
        run: |
          curl -X POST ${{ secrets.MARKET_SIGNAL_ENDPOINT }} \
            -H "Content-Type: application/json" \
            --fail --show-error
