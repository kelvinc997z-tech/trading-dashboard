name: Update Market Signals

on:
  schedule:
    # Run every hour to support 1h intervals for Gold (XAUT)
    - cron: "0 * * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market signal generation
        run: |
          curl -X POST ${{ secrets.MARKET_SIGNAL_ENDPOINT }} \
            -H "Content-Type: application/json" \
            --fail --show-error