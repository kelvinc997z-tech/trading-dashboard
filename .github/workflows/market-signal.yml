name: Update Market Signals

on:
  schedule:
    # Run every 4 hours: 00:00, 04:00, 08:00, 12:00, 16:00, 20:00 UTC
    - cron: "0 */4 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger market signal generation
        run: |
          curl -X POST ${{ secrets.MARKET_SIGNAL_ENDPOINT }} \
            -H "Content-Type: application/json" \
            --fail --show-error