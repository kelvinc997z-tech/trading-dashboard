name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-35
          build-tools;35.0.0
          platform-tools
        accept-android-sdk-licenses: true

    - name: Accept all Android SDK licenses (extra safety)
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
      continue-on-error: true

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Prepare TWA manifest
      run: |
        if [ -f "android-twa/twa-manifest.json" ]; then
          cp android-twa/twa-manifest.json .
          echo "✅ Copied twa-manifest.json to project root"
        else
          echo "❌ twa-manifest.json not found in android-twa/"
          exit 1
        fi
        # Validate JSON syntax
        jq empty twa-manifest.json
        echo "✅ Manifest valid"

    - name: Initialize TWA project
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e  # Exit on any error
        echo "JAVA_HOME: $JAVA_HOME"
        ls -la "$JAVA_HOME" 2>/dev/null || echo "JAVA_HOME not found, relying on system Java"
        
        # Run bubblewrap init
        bubblewrap init \
          --packageId="$(jq -r '.packageId' twa-manifest.json)" \
          --name="$(jq -r '.name' twa-manifest.json)" \
          --versionCode="$(jq -r '.versionCode' twa-manifest.json)" \
          --versionName="$(jq -r '.version' twa-manifest.json)" \
          --host="$(jq -r '.host' twa-manifest.json)" \
          --startUrl=/ \
          --display="$(jq -r '.display' twa-manifest.json)" \
          --themeColor="$(jq -r '.themeColor' twa-manifest.json)" \
          --backgroundColor="$(jq -r '.backgroundColor' twa-manifest.json)" \
          --orientation="$(jq -r '.orientation' twa-manifest.json)" \
          --no-auto-version-check
        
        # Verify .twa directory was created
        if [ ! -d ".twa" ]; then
          echo "❌ .twa directory not created!"
          ls -la
          exit 1
        fi
        echo "✅ .twa directory created successfully"

    - name: Build Debug APK
      working-directory: .twa
      run: |
        set -e
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-debug-apk
        path: |
          .twa/app/build/outputs/apk/debug/app-debug.apk
          .twa/app/build/outputs/apk/debug/
        retention-days: 14

    - name: Build Release APK
      if: always()
      working-directory: .twa
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set -e
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "⚠️ No keystore secret provided — skipping release build."
          exit 0
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        echo "android.signingConfigs.release.storeFile=release.keystore" >> gradle.properties
        echo "android.signingConfigs.release.storePassword=$KEYSTORE_PASSWORD" >> gradle.properties
        echo "android.signingConfigs.release.keyAlias=$KEY_ALIAS" >> gradle.properties
        echo "android.signingConfigs.release.keyPassword=$KEY_PASSWORD" >> gradle.properties
        chmod +x ./gradlew
        ./gradlew assembleRelease
        echo "✅ Release APK built."

    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-release-apk
        path: |
          .twa/app/build/outputs/apk/release/app-release.apk
          .twa/app/build/outputs/apk/release/
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        rm -rf .twa release.keystore twa-manifest.json
