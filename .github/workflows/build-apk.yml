name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2
      with:
        packages: |
          platforms;android-34
          build-tools;34.0.0
          platform-tools
        accept-android-sdk-licenses: true
        cmdline-tools-version: 12266719

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Prepare TWA manifest
      run: |
        set -e
        if [ -f "android-twa/twa-manifest.json" ]; then
          cp android-twa/twa-manifest.json .
          echo "✅ Copied twa-manifest.json to project root"
        else
          echo "❌ twa-manifest.json not found in android-twa/"
          exit 1
        fi
        echo "📄 Manifest content:"
        cat twa-manifest.json
        # Validate JSON
        if ! jq empty twa-manifest.json 2>/dev/null; then
          echo "❌ Manifest is not valid JSON"
          exit 1
        fi
        echo "✅ Manifest valid JSON"

    - name: Initialize TWA project
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e
        set -x

        # Capture all output to init.log
        exec > >(tee init.log) 2>&1

        echo "🔧 Environment:"
        which java || echo "java not found"
        java -version || true
        which bubblewrap || echo "bubblewrap not found"
        bubblewrap --version || true
        echo "ANDROID_HOME=${ANDROID_HOME:-not set}"
        echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-not set}"
        echo "Current dir: $(pwd)"
        ls -la
        echo "SDK platforms: " && ls -la "$ANDROID_HOME/platforms" 2>/dev/null || true
        echo "SDK build-tools: " && ls -la "$ANDROID_HOME/build-tools" 2>/dev/null || true

        echo "📋 Manifest values:"
        PACKAGE_ID=$(jq -r '.packageId' twa-manifest.json)
        NAME=$(jq -r '.name' twa-manifest.json)
        VERSION_CODE=$(jq -r '.versionCode' twa-manifest.json)
        VERSION_NAME=$(jq -r '.version' twa-manifest.json)
        HOST=$(jq -r '.host' twa-manifest.json)
        DISPLAY=$(jq -r '.display' twa-manifest.json)
        THEME_COLOR=$(jq -r '.themeColor' twa-manifest.json)
        BACKGROUND_COLOR=$(jq -r '.backgroundColor' twa-manifest.json)
        ORIENTATION=$(jq -r '.orientation' twa-manifest.json)
        echo "packageId=$PACKAGE_ID name=$NAME versionCode=$VERSION_CODE versionName=$VERSION_NAME host=$HOST display=$DISPLAY orientation=$ORIENTATION"

        echo "🚀 bubblewrap init..."
        bubblewrap init \
          --packageId="$PACKAGE_ID" \
          --name="$NAME" \
          --versionCode="$VERSION_CODE" \
          --versionName="$VERSION_NAME" \
          --host="$HOST" \
          --startUrl=/ \
          --display="$DISPLAY" \
          --themeColor="$THEME_COLOR" \
          --backgroundColor="$BACKGROUND_COLOR" \
          --orientation="$ORIENTATION" \
          --no-auto-version-check

        echo "✅ init completed"
        ls -la
        if [ ! -d ".twa" ]; then
          echo "❌ .twa directory missing!"
          find . -maxdepth 2 -type d -name ".twa" 2>/dev/null
          exit 1
        fi
        echo "✅ .twa exists"
        ls -la .twa

    - name: Upload init log if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bubblewrap-init-log
        path: init.log
        retention-days: 7

    - name: Build Debug APK
      if: always()
      working-directory: .twa
      run: |
        set -e
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-debug-apk
        path: |
          .twa/app/build/outputs/apk/debug/app-debug.apk
          .twa/app/build/outputs/apk/debug/
        retention-days: 14

    - name: Build Release APK
      if: always()
      working-directory: .twa
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set -e
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "⚠️ No keystore secret provided — skipping release build."
          exit 0
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        echo "android.signingConfigs.release.storeFile=release.keystore" >> gradle.properties
        echo "android.signingConfigs.release.storePassword=$KEYSTORE_PASSWORD" >> gradle.properties
        echo "android.signingConfigs.release.keyAlias=$KEY_ALIAS" >> gradle.properties
        echo "android.signingConfigs.release.keyPassword=$KEY_PASSWORD" >> gradle.properties
        chmod +x ./gradlew
        ./gradlew assembleRelease
        echo "✅ Release APK built."

    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-release-apk
        path: |
          .twa/app/build/outputs/apk/release/app-release.apk
          .twa/app/build/outputs/apk/release/
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        rm -rf .twa release.keystore twa-manifest.json
