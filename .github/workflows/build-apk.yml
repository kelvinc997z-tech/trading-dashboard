name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Android SDK (fully manual)
      run: |
        set -e
        set -x

        # Set variables
        ANDROID_HOME=$HOME/android-sdk
        ANDROID_SDK_ROOT=$ANDROID_HOME
        mkdir -p "$ANDROID_HOME"

        # Download commandline tools (version 12266719 - known stable)
        curl -fsSL https://dl.google.com/android/repository/commandlinetools-linux-12266719_latest.zip -o cmdline-tools.zip

        # Extract to a temporary directory, then move to proper location
        TEMP_DIR=$(mktemp -d)
        unzip -q cmdline-tools.zip -d "$TEMP_DIR"
        mkdir -p "$ANDROID_HOME/cmdline-tools/latest"
        mv "$TEMP_DIR/cmdline-tools/"* "$ANDROID_HOME/cmdline-tools/latest/"
        rm -rf "$TEMP_DIR" cmdline-tools.zip

        export ANDROID_HOME
        export ANDROID_SDK_ROOT
        export PATH="$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH"

        # Use explicit sdkmanager path
        SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"

        # Show sdkmanager version for debugging
        "$SDKMANAGER" --version

        # Accept all licenses non-interactively (for the packages we will install)
        yes | "$SDKMANAGER" --licenses >/dev/null || true

        # Update repository index
        "$SDKMANAGER" --update || true

        # Install required stable packages (try Android 34, fallback to 33)
        if "$SDKMANAGER" --list | grep -q "platforms;android-34"; then
          echo "Installing Android 34 and build-tools 34.0.0..."
          "$SDKMANAGER" --channel=0 "platforms;android-34" "build-tools;34.0.0" "platform-tools"
        else
          echo "Android 34 not available, installing Android 33 and build-tools 33.0.2..."
          "$SDKMANAGER" --channel=0 "platforms;android-33" "build-tools;33.0.2" "platform-tools"
        fi

        # Verify installation
        "$SDKMANAGER" --list | grep -iE "platforms;android-|build-tools;|platform-tools" | grep -v "^extras;" || true

        # Persist environment for subsequent steps
        echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
        echo "PATH=$PATH" >> $GITHUB_ENV

    - name: Install Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Prepare TWA manifest
      run: |
        set -e
        if [ -f "android-twa/twa-manifest.json" ]; then
          cp android-twa/twa-manifest.json .
          echo "Copied twa-manifest.json to project root"
        else
          echo "twa-manifest.json not found in android-twa/"
          exit 1
        fi
        echo "Manifest content:"
        cat twa-manifest.json
        # Validate JSON
        if ! jq empty twa-manifest.json 2>/dev/null; then
          echo "Manifest is not valid JSON"
          exit 1
        fi

    - name: Initialize TWA project
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e
        set -x

        # Capture all output to init.log
        exec > >(tee init.log) 2>&1

        echo "🔧 Environment:"
        which java || echo "java not found"
        java -version || true
        which bubblewrap || echo "bubblewrap not found"
        bubblewrap --version || true
        echo "ANDROID_HOME=${ANDROID_HOME:-not set}"
        echo "Current dir: $(pwd)"
        ls -la
        echo "SDK platforms: " && ls -la "$ANDROID_HOME/platforms" 2>/dev/null || true
        echo "SDK build-tools: " && ls -la "$ANDROID_HOME/build-tools" 2>/dev/null || true

        echo "📋 Manifest values:"
        PACKAGE_ID=$(jq -r '.packageId' twa-manifest.json)
        NAME=$(jq -r '.name' twa-manifest.json)
        VERSION_CODE=$(jq -r '.versionCode' twa-manifest.json)
        VERSION_NAME=$(jq -r '.version' twa-manifest.json)
        HOST=$(jq -r '.host' twa-manifest.json)
        DISPLAY=$(jq -r '.display' twa-manifest.json)
        THEME_COLOR=$(jq -r '.themeColor' twa-manifest.json)
        BACKGROUND_COLOR=$(jq -r '.backgroundColor' twa-manifest.json)
        ORIENTATION=$(jq -r '.orientation' twa-manifest.json)
        echo "packageId=$PACKAGE_ID name=$NAME versionCode=$VERSION_CODE versionName=$VERSION_NAME host=$HOST display=$DISPLAY orientation=$ORIENTATION"

        # Tell bubblewrap to skip JDK install and use existing JAVA_HOME
        export BUBBLEWRAP_JAVA_HOME="$JAVA_HOME"
        export BUBBLEWRAP_SKIP_JDK_INSTALL=1

        echo "🚀 bubblewrap init..."
        set +e
        # Pipe 'n' to skip JDK install prompt, and specify JDK dir explicitly
        echo "n" | bubblewrap init \
          --verbose \
          --packageId="$PACKAGE_ID" \
          --name="$NAME" \
          --versionCode="$VERSION_CODE" \
          --versionName="$VERSION_NAME" \
          --host="$HOST" \
          --startUrl=/ \
          --display="$DISPLAY" \
          --themeColor="$THEME_COLOR" \
          --backgroundColor="$BACKGROUND_COLOR" \
          --orientation="$ORIENTATION" \
          --no-auto-version-check \
          --no-jdk-install \
          --jdk-dir="$JAVA_HOME"
        EXIT_CODE=$?
        set -e
        echo "📊 bubblewrap init exit code: $EXIT_CODE"
        echo "📁 Listing after init:"
        ls -la
        echo "🔍 Searching for .twa:"
        find . -maxdepth 2 -name .twa -type d 2>/dev/null || true
        echo "📄 Check gradle files:"
        ls -la .twa 2>/dev/null || echo ".twa not found"

        if [ $EXIT_CODE -ne 0 ]; then
          echo "❌ bubblewrap init failed"
          exit $EXIT_CODE
        fi

        if [ ! -d ".twa" ]; then
          echo "❌ .twa directory missing!"
          find . -maxdepth 2 -type d -name ".twa" 2>/dev/null
          exit 1
        fi

        echo "✅ init completed, .twa exists"
        ls -la .twa

    - name: Upload init log if failed
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: bubblewrap-init-log
        path: init.log
        retention-days: 7

    - name: Build Debug APK
      if: always()
      working-directory: .twa
      run: |
        set -e
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-debug-apk
        path: |
          .twa/app/build/outputs/apk/debug/app-debug.apk
          .twa/app/build/outputs/apk/debug/
        retention-days: 14

    - name: Build Release APK
      if: always()
      working-directory: .twa
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEYSTORE_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set -e
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "⚠️ No keystore secret provided — skipping release build."
          exit 0
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        echo "android.signingConfigs.release.storeFile=release.keystore" >> gradle.properties
        echo "android.signingConfigs.release.storePassword=$KEYSTORE_PASSWORD" >> gradle.properties
        echo "android.signingConfigs.release.keyAlias=$KEY_ALIAS" >> gradle.properties
        echo "android.signingConfigs.release.keyPassword=$KEY_PASSWORD" >> gradle.properties
        chmod +x ./gradlew
        ./gradlew assembleRelease
        echo "✅ Release APK built."

    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-release-apk
        path: |
          .twa/app/build/outputs/apk/release/app-release.apk
          .twa/app/build/outputs/apk/release/
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        rm -rf .twa release.keystore twa-manifest.json init.log
