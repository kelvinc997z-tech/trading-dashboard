name: Build TWA APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Java JDK
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platforms;android-35
          build-tools;35.0.0
          platform-tools
        accept-android-sdk-licenses: true

    - name: Accept all Android SDK licenses (extra safety)
      run: |
        yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
      continue-on-error: true

    - name: Install Node.js 24 (avoid deprecation warnings)
      uses: actions/setup-node@v4
      with:
        node-version: '24'

    - name: Install Bubblewrap CLI
      run: npm install -g @bubblewrap/cli

    - name: Prepare TWA manifest
      run: |
        set -e
        if [ -f "android-twa/twa-manifest.json" ]; then
          cp android-twa/twa-manifest.json .
          echo "✅ Copied twa-manifest.json to project root"
        else
          echo "❌ twa-manifest.json not found in android-twa/"
          echo "📂 Listing android-twa directory:"
          ls -la android-twa/ || echo "android-twa directory not found"
          exit 1
        fi
        echo "📄 Manifest content:"
        cat twa-manifest.json
        # Validate JSON syntax
        if ! jq empty twa-manifest.json 2>/dev/null; then
          echo "❌ Manifest is not valid JSON"
          exit 1
        fi
        echo "✅ Manifest valid JSON"

    - name: Initialize TWA project
      env:
        DEBIAN_FRONTEND: noninteractive
      run: |
        set -e
        set -x  # Echo all commands
        
        echo "🔧 Environment check:"
        echo "JAVA_HOME=${JAVA_HOME:-not set}"
        which java || echo "java not in PATH"
        which bubblewrap || echo "bubblewrap not in PATH"
        echo "Current dir: $(pwd)"
        ls -la
        
        echo "📦 Reading manifest values:"
        PACKAGE_ID=$(jq -r '.packageId' twa-manifest.json)
        NAME=$(jq -r '.name' twa-manifest.json)
        VERSION_CODE=$(jq -r '.versionCode' twa-manifest.json)
        VERSION_NAME=$(jq -r '.version' twa-manifest.json)
        HOST=$(jq -r '.host' twa-manifest.json)
        DISPLAY=$(jq -r '.display' twa-manifest.json)
        THEME_COLOR=$(jq -r '.themeColor' twa-manifest.json)
        BACKGROUND_COLOR=$(jq -r '.backgroundColor' twa-manifest.json)
        ORIENTATION=$(jq -r '.orientation' twa-manifest.json)
        
        echo "📋 Params: packageId=$PACKAGE_ID name=$NAME versionCode=$VERSION_CODE versionName=$VERSION_NAME host=$HOST display=$DISPLAY orientation=$ORIENTATION"
        
        echo "🚀 Running bubblewrap init..."
        bubblewrap init \
          --packageId="$PACKAGE_ID" \
          --name="$NAME" \
          --versionCode="$VERSION_CODE" \
          --versionName="$VERSION_NAME" \
          --host="$HOST" \
          --startUrl=/ \
          --display="$DISPLAY" \
          --themeColor="$THEME_COLOR" \
          --backgroundColor="$BACKGROUND_COLOR" \
          --orientation="$ORIENTATION" \
          --no-auto-version-check
        
        echo "✅ bubblewrap init completed"
        echo "📂 After init:"
        ls -la
        if [ -d ".twa" ]; then
          echo "✅ .twa directory exists"
          ls -la .twa
        else
          echo "❌ .twa directory NOT created!"
          echo "📂 Searching for .twa:"
          find . -name ".twa" -type d 2>/dev/null
          exit 1
        fi

    - name: Build Debug APK
      if: always()
      working-directory: .twa
      run: |
        set -e
        chmod +x ./gradlew
        ./gradlew assembleDebug

    - name: Upload Debug APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-debug-apk
        path: |
          .twa/app/build/outputs/apk/debug/app-debug.apk
          .twa/app/build/outputs/apk/debug/
        retention-days: 14

    - name: Build Release APK
      if: always()
      working-directory: .twa
      env:
        KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        set -e
        if [ -z "$KEYSTORE_BASE64" ]; then
          echo "⚠️ No keystore secret provided — skipping release build."
          exit 0
        fi
        echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
        echo "android.signingConfigs.release.storeFile=release.keystore" >> gradle.properties
        echo "android.signingConfigs.release.storePassword=$KEYSTORE_PASSWORD" >> gradle.properties
        echo "android.signingConfigs.release.keyAlias=$KEY_ALIAS" >> gradle.properties
        echo "android.signingConfigs.release.keyPassword=$KEY_PASSWORD" >> gradle.properties
        chmod +x ./gradlew
        ./gradlew assembleRelease
        echo "✅ Release APK built."

    - name: Upload Release APK
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trading-dashboard-release-apk
        path: |
          .twa/app/build/outputs/apk/release/app-release.apk
          .twa/app/build/outputs/apk/release/
        retention-days: 30

    - name: Cleanup
      if: always()
      run: |
        rm -rf .twa release.keystore twa-manifest.json
